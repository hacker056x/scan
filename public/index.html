<script>
let todosHits = [];
let scanActivo = false;
let abortController = null;

function randomizeEmojis() {
    const selectors = document.querySelectorAll('.emoji-select');
    selectors.forEach(select => {
        if(select.id === 'printCategories') return;
        const randomIndex = Math.floor(Math.random() * select.options.length);
        select.selectedIndex = randomIndex;
    });
}

function atualizarStatus(testados, total, hits, invalidos) {
    document.getElementById("testados").textContent = testados;
    document.getElementById("total").textContent = total;
    document.getElementById("hits").textContent = hits;
    document.getElementById("invalidos").textContent = invalidos;
}

function desabilitarBotoes(scanAtivo) {
    document.getElementById("startBtn").disabled = scanAtivo;
    document.getElementById("stopBtn").disabled = !scanAtivo;
}

function limparHost(host) {
    return host.replace(/^https?:\/\//i, "").trim();
}

function mostrarHitNaTela(hit) {
    let divResultado = document.getElementById('resultado');
    if (!divResultado) {
        divResultado = document.createElement('div');
        divResultado.id = 'resultado';
        const joinBox = document.querySelector('.join-box');
        joinBox.parentNode.insertBefore(divResultado, joinBox.nextSibling);
    }
    const bloco = document.createElement('div');
    bloco.className = 'hit-block';
    const botoes = document.createElement('div');
    botoes.className = 'hit-buttons';
    const btnCopiar = document.createElement('button');
    btnCopiar.textContent = 'COPY HIT';
    
    btnCopiar.onclick = () => {
        navigator.clipboard.writeText(hit).then(() => {
            alert('✅ HIT copiado al portapapeles!');
        }).catch(() => {
            alert('❌ Error al copiar');
        });
    };

    botoes.appendChild(btnCopiar);
    bloco.appendChild(botoes);
    const texto = document.createElement('pre');
    texto.textContent = hit;
    bloco.appendChild(texto);
    divResultado.appendChild(bloco);
    divResultado.scrollTop = divResultado.scrollHeight;
}

async function iniciarScan() {
    if (!document.getElementById('host').value) {
        alert('❌ Ingresa el host para escanear!');
        return;
    }
    if (!document.getElementById('comboFile').files[0]) {
        alert('❌ Selecciona un archivo .txt con combos!');
        return;
    }
    
    scanActivo = true;
    desabilitarBotoes(true);
    
    const existingResultDiv = document.getElementById('resultado');
    if (existingResultDiv) existingResultDiv.innerHTML = '';
    todosHits = [];
    
    const nick = document.getElementById('nick').value.trim() || 'FAWX';
    const host = limparHost(document.getElementById('host').value.trim());
    const file = document.getElementById('comboFile').files[0];
    const numBots = document.getElementById('numBots').value;
    
    // Recoger emojis
    const emojis = {
        emojiHeader: document.getElementById('emojiHeader').value,
        hitsPor: document.getElementById('emojiHitsPor').value,
        servidor: document.getElementById('emojiServidor').value,
        usuario: document.getElementById('emojiUsuario').value,
        senha: document.getElementById('emojiSenha').value,
        criada: document.getElementById('emojiCriada').value,
        expira: document.getElementById('emojiExpira').value,
        status: document.getElementById('emojiStatus').value,
        emojiTrial: document.getElementById('emojiTrial').value,
        conectados: document.getElementById('emojiConectados').value,
        conexoes: document.getElementById('emojiConexoes').value,
        emojiTimezone: document.getElementById('emojiTimezone').value,
        linkM3U: document.getElementById('emojiLinkM3U').value,
        emojiEpgLink: document.getElementById('emojiEpgLink').value,
        emojiMessage: document.getElementById('emojiMessage').value,
        emojiChannels: document.getElementById('emojiChannels').value,
        emojiMovies: document.getElementById('emojiMovies').value,
        emojiSeries: document.getElementById('emojiSeries').value,
        emojiRealServer: document.getElementById('emojiRealServer').value,
        emojiRealM3U: document.getElementById('emojiRealM3U').value,
        emojiLocation: document.getElementById('emojiLocation').value,
        emojiProtocol: document.getElementById('emojiProtocol').value,
        emojiDuration: document.getElementById('emojiDuration').value
    };
    
    const formData = new FormData();
    formData.append('host', host);
    formData.append('nick', nick);
    formData.append('numBots', numBots);
    formData.append('printCategories', document.getElementById('printCategories').value);
    formData.append('channelSeparator', document.getElementById('channelSeparator').value);
    formData.append('movieSeparator', document.getElementById('movieSeparator').value);
    formData.append('seriesSeparator', document.getElementById('seriesSeparator').value);
    formData.append('canalLink', document.getElementById('canalGrupoLink').value);
    formData.append('emojiCanal', document.getElementById('emojiCanalGrupo').value);
    formData.append('emojiCanalGrupo', document.getElementById('emojiCanalGrupo').value);
    formData.append('emojis', JSON.stringify(emojis));
    formData.append('comboFile', file);
    
    // Mostrar spinner o mensaje de carga
    const startBtn = document.getElementById('startBtn');
    const originalText = startBtn.textContent;
    startBtn.textContent = 'ESCANEANDO...';
    startBtn.disabled = true;
    
    try {
        abortController = new AbortController();
        
        const response = await fetch('/api/scan', {
            method: 'POST',
            body: formData,
            signal: abortController.signal
        });
        
        const data = await response.json();
        
        if (data.success) {
            // Mostrar todos los hits
            for (const hit of data.hits) {
                if (!scanActivo) break;
                mostrarHitNaTela(hit);
                todosHits.push(hit);
            }
            
            // Actualizar estadísticas
            atualizarStatus(
                data.stats.testados,
                data.stats.total,
                data.stats.hits,
                data.stats.invalidos
            );
            
            alert(`✅ ESCANEO COMPLETADO!\n📊 HITS: ${data.stats.hits}\n❌ BAD: ${data.stats.invalidos}`);
        } else {
            alert(`❌ Error: ${data.error}`);
        }
    } catch (error) {
        if (error.name === 'AbortError') {
            alert('⏹️ Escaneo detenido por el usuario');
        } else {
            console.error('Error:', error);
            alert(`❌ Error en el escaneo: ${error.message}`);
        }
    } finally {
        scanActivo = false;
        desabilitarBotoes(false);
        startBtn.textContent = originalText;
        startBtn.disabled = false;
        abortController = null;
    }
}

function pararScan() {
    if (abortController) {
        scanActivo = false;
        abortController.abort();
        desabilitarBotoes(false);
    }
}

function enviarTodosHits() {
    if (todosHits.length === 0) {
        alert("❌ No hay hits para guardar!");
        return;
    }
    
    const host = limparHost(document.getElementById('host').value.trim()) || 'scan';
    const headerEmoji = document.getElementById('emojiHeader').value;
    const filename = `[👻][${host}][Team${headerEmoji}Stablack${headerEmoji}Scan${headerEmoji}𝙼𝟹𝚄🤴].txt`;
    
    const blob = new Blob([todosHits.join("\n\n\n")], { type: "text/plain" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
}
</script>
