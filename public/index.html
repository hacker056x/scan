<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Starblack SCAN</title>
    <style>
        body {
            background: #0d0d0d;
            color: #eee;
            font-family: monospace;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .box {
            border: 1px solid #ff0000;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            background: #1a1a1a;
        }
        input, button, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #222;
            color: #eee;
            border: 1px solid #990000;
            border-radius: 8px;
        }
        button {
            background: #ff0000;
            cursor: pointer;
            font-weight: bold;
        }
        button:disabled {
            background: #555;
            cursor: not-allowed;
        }
        .hit-block {
            background: #2a2a2a;
            border: 1px solid #ff0000;
            border-radius: 8px;
            padding: 10px;
            margin: 10px 0;
            white-space: pre-wrap;
            font-size: 12px;
        }
        #resultado {
            max-height: 500px;
            overflow-y: auto;
        }
        .stats {
            display: flex;
            gap: 20px;
            justify-content: space-between;
        }
        .progress-line {
            display: block;
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>🔥 Team Starblack M3U SCAN 🔥</h1>
        <hr>
        
        <label>🏷️ NICKNAME</label>
        <input type="text" id="nick" value="@hacker056">
        
        <label>🌐 HOST (ejemplo: 1.2.3.4:8080)</label>
        <input type="text" id="host" placeholder="ejemplo.com:8080">
        
        <label>📁 ARCHIVO COMBO (user:pass)</label>
        <input type="file" id="comboFile" accept=".txt">
        
        <label>🤖 BOTS (recomendado: 5-20)</label>
        <input type="number" id="numBots" value="10" min="1" max="50">
        
        <button id="startBtn" onclick="iniciarScan()">▶ INICIAR ESCANEO</button>
        <button id="stopBtn" onclick="pararScan()" disabled>⏹ DETENER</button>
        <button onclick="guardarHits()">💾 GUARDAR HITS</button>
    </div>
    
    <div class="box">
        <h3>📊 ESTADÍSTICAS</h3>
        <div class="stats">
            <span>📝 TESTADOS: <span id="testados">0</span>/<span id="total">0</span></span>
            <span>✅ HITS: <span id="hits">0</span></span>
            <span>❌ BAD: <span id="invalidos">0</span></span>
        </div>
    </div>
    
    <div class="box">
        <h3>📺 RESULTADOS</h3>
        <div id="resultado"></div>
    </div>
    
    <script>
        let todosHits = [];
        let scanActivo = false;
        let abortController = null;
        
        function actualizarStats(testados, total, hits, invalidos) {
            document.getElementById('testados').textContent = testados;
            document.getElementById('total').textContent = total;
            document.getElementById('hits').textContent = hits;
            document.getElementById('invalidos').textContent = invalidos;
        }
        
        function deshabilitarBotones(escaneando) {
            document.getElementById('startBtn').disabled = escaneando;
            document.getElementById('stopBtn').disabled = !escaneando;
        }
        
        function limpiarHost(host) {
            return host.replace(/^https?:\/\//, '').trim();
        }
        
        function mostrarHit(hit) {
            const resultado = document.getElementById('resultado');
            const block = document.createElement('div');
            block.className = 'hit-block';
            
            const copyBtn = document.createElement('button');
            copyBtn.textContent = '📋 COPIAR';
            copyBtn.style.width = 'auto';
            copyBtn.style.padding = '5px 10px';
            copyBtn.onclick = () => {
                navigator.clipboard.writeText(hit);
                alert('✅ Hit copiado!');
            };
            
            const pre = document.createElement('pre');
            pre.textContent = hit;
            pre.style.whiteSpace = 'pre-wrap';
            pre.style.margin = '10px 0 0 0';
            
            block.appendChild(copyBtn);
            block.appendChild(pre);
            resultado.appendChild(block);
            resultado.scrollTop = resultado.scrollHeight;
        }
        
        async function iniciarScan() {
            const host = document.getElementById('host').value.trim();
            const file = document.getElementById('comboFile').files[0];
            
            if (!host) {
                alert('❌ Ingresa un HOST');
                return;
            }
            if (!file) {
                alert('❌ Selecciona un archivo de combos');
                return;
            }
            
            scanActivo = true;
            deshabilitarBotones(true);
            document.getElementById('resultado').innerHTML = '';
            todosHits = [];
            actualizarStats(0, 0, 0, 0);
            
            const formData = new FormData();
            formData.append('host', limpiarHost(host));
            formData.append('nick', document.getElementById('nick').value || '@hacker056');
            formData.append('numBots', document.getElementById('numBots').value);
            formData.append('printCategories', 'false');
            formData.append('channelSeparator', '«[📺]»');
            formData.append('movieSeparator', '«[🎬]»');
            formData.append('seriesSeparator', '«[📺]»');
            formData.append('canalLink', '');
            formData.append('emojiCanal', '📬');
            formData.append('emojis', JSON.stringify({
                emojiHeader: '★', hitsPor: '🎯', servidor: '🌐', usuario: '🤴',
                senha: '🔐', criada: '🗓️', expira: '📆', status: '🔋',
                emojiTrial: '⏲️', conectados: '👪', conexoes: '🧮',
                emojiTimezone: '🕰️', linkM3U: '🔗', emojiEpgLink: '📑',
                emojiMessage: '✍️', emojiChannels: '📺', emojiMovies: '🎬',
                emojiSeries: '🎞️', emojiRealServer: '📡', emojiRealM3U: '⛓️',
                emojiLocation: '🌍', emojiProtocol: '📖', emojiDuration: '⏳'
            }));
            formData.append('comboFile', file);
            
            const startBtn = document.getElementById('startBtn');
            const originalText = startBtn.textContent;
            startBtn.textContent = '🔄 ESCANEANDO...';
            
            try {
                abortController = new AbortController();
                const response = await fetch('/api/scan', {
                    method: 'POST',
                    body: formData,
                    signal: abortController.signal,
                    timeout: 300000 // 5 minutos timeout
                });
                
                const data = await response.json();
                
                if (data.success) {
                    for (const hit of data.hits) {
                        if (!scanActivo) break;
                        mostrarHit(hit);
                        todosHits.push(hit);
                    }
                    
                    actualizarStats(
                        data.stats.testados,
                        data.stats.total,
                        data.stats.hits,
                        data.stats.invalidos
                    );
                    
                    alert(`✅ ESCANEO COMPLETADO!\n✅ HITS: ${data.stats.hits}\n❌ BAD: ${data.stats.invalidos}`);
                } else {
                    alert(`❌ Error: ${data.error}`);
                }
            } catch (error) {
                if (error.name === 'AbortError') {
                    alert('⏹️ Escaneo detenido');
                } else {
                    console.error('Error:', error);
                    alert(`❌ Error: ${error.message}`);
                }
            } finally {
                scanActivo = false;
                deshabilitarBotones(false);
                startBtn.textContent = originalText;
                abortController = null;
            }
        }
        
        function pararScan() {
            if (abortController) {
                scanActivo = false;
                abortController.abort();
                deshabilitarBotones(false);
            }
        }
        
        function guardarHits() {
            if (todosHits.length === 0) {
                alert('❌ No hay hits para guardar');
                return;
            }
            
            const host = document.getElementById('host').value.trim() || 'scan';
            const filename = `Team_Starblack_${host}_${new Date().toISOString().slice(0,19)}.txt`;
            const blob = new Blob([todosHits.join('\n\n\n')], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
