<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Starblack SCAN</title>
    <style>
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0a0a 100%);
            color: #fff;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            padding: 30px;
            border: 2px solid #ff0000;
            border-radius: 20px;
            background: rgba(0,0,0,0.8);
            margin-bottom: 30px;
            box-shadow: 0 0 30px rgba(255,0,0,0.3);
        }
        .header h1 {
            color: #ff0000;
            text-shadow: 0 0 20px #ff0000;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .box {
            background: rgba(0,0,0,0.8);
            border: 1px solid #ff0000;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 0 15px rgba(255,0,0,0.2);
        }
        .box h3 {
            color: #ff0000;
            margin-bottom: 20px;
            border-left: 4px solid #ff0000;
            padding-left: 15px;
        }
        label {
            display: block;
            margin: 15px 0 5px 0;
            font-weight: bold;
            color: #ff6666;
        }
        input {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #ff0000;
            color: #fff;
            border-radius: 8px;
            font-family: monospace;
            font-size: 14px;
        }
        input[type="file"] {
            cursor: pointer;
            padding: 10px;
        }
        button {
            background: #ff0000;
            color: #fff;
            border: none;
            padding: 12px 25px;
            margin: 15px 10px 0 0;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-family: monospace;
            font-size: 14px;
            transition: all 0.3s;
        }
        button:hover:not(:disabled) {
            background: #cc0000;
            transform: scale(1.02);
            box-shadow: 0 0 15px #ff0000;
        }
        button:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }
        .stat-card {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid #ff0000;
        }
        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ff0000;
        }
        .stat-label {
            font-size: 0.8rem;
            color: #aaa;
            margin-top: 5px;
        }
        .results {
            max-height: 500px;
            overflow-y: auto;
        }
        .hit {
            background: #0d0d0d;
            border: 1px solid #ff0000;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            position: relative;
            animation: fadeIn 0.5s;
        }
        .hit pre {
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 11px;
            margin-top: 35px;
            color: #00ff00;
        }
        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 5px 15px;
            font-size: 11px;
            margin: 0;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #ff0000;
        }
        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #ff0000;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .footer {
            text-align: center;
            padding: 20px;
            color: #666;
        }
        hr {
            border-color: #ff0000;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔥 TEAM STARBLACK M3U SCAN 🔥</h1>
            <p>Xtream Codes IPTV Scanner - Encuentra cuentas válidas</p>
        </div>

        <div class="box">
            <h3>⚙️ CONFIGURACIÓN</h3>
            
            <label>🏷️ NICKNAME (tu nombre)</label>
            <input type="text" id="nick" value="@hacker056" placeholder="@tu_nick">
            
            <label>🌐 HOST (ejemplo: servidor-iptv.com:8080)</label>
            <input type="text" id="host" placeholder="ejemplo.com:8080">
            
            <label>📁 ARCHIVO COMBO (user:pass - una por línea)</label>
            <input type="file" id="comboFile" accept=".txt">
            
            <hr>
            
            <div>
                <button id="startBtn" onclick="startScan()">🚀 INICIAR ESCANEO</button>
                <button id="stopBtn" onclick="stopScan()" disabled>⏹️ DETENER</button>
                <button onclick="saveHits()">💾 GUARDAR HITS</button>
                <button onclick="clearResults()">🗑️ LIMPIAR</button>
            </div>
        </div>

        <div class="box">
            <h3>📊 ESTADÍSTICAS EN VIVO</h3>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="testados">0</div>
                    <div class="stat-label">TESTADOS</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="total">0</div>
                    <div class="stat-label">TOTAL</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="hits">0</div>
                    <div class="stat-label">✅ HITS</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="invalidos">0</div>
                    <div class="stat-label">❌ BAD</div>
                </div>
            </div>
        </div>

        <div class="box">
            <h3>📺 RESULTADOS</h3>
            <div id="results" class="results">
                <div class="loading">Esperando inicio del escaneo...</div>
            </div>
        </div>
        
        <div class="footer">
            <p>🔥 Team Starblack M3U SCAN | BY @hacker056 🔥</p>
        </div>
    </div>

    <script>
        let allHits = [];
        let isScanning = false;
        let currentAbortController = null;
        
        function updateStats(tested, total, hits, bad) {
            document.getElementById('testados').textContent = tested;
            document.getElementById('total').textContent = total;
            document.getElementById('hits').textContent = hits;
            document.getElementById('invalidos').textContent = bad;
        }
        
        function disableButtons(scanning) {
            document.getElementById('startBtn').disabled = scanning;
            document.getElementById('stopBtn').disabled = !scanning;
        }
        
        function cleanHost(host) {
            return host.replace(/^https?:\/\//, '').replace(/\/$/, '').trim();
        }
        
        function addHitToDisplay(hitText) {
            const resultsDiv = document.getElementById('results');
            
            // Remover mensaje de carga si existe
            if (resultsDiv.querySelector('.loading') && allHits.length === 0) {
                resultsDiv.innerHTML = '';
            }
            
            const hitDiv = document.createElement('div');
            hitDiv.className = 'hit';
            
            const copyBtn = document.createElement('button');
            copyBtn.textContent = '📋 COPIAR HIT';
            copyBtn.className = 'copy-btn';
            copyBtn.onclick = () => {
                navigator.clipboard.writeText(hitText);
                copyBtn.textContent = '✅ COPIADO!';
                setTimeout(() => {
                    copyBtn.textContent = '📋 COPIAR HIT';
                }, 2000);
            };
            
            const pre = document.createElement('pre');
            pre.textContent = hitText;
            
            hitDiv.appendChild(copyBtn);
            hitDiv.appendChild(pre);
            resultsDiv.appendChild(hitDiv);
            resultsDiv.scrollTop = resultsDiv.scrollHeight;
        }
        
        async function startScan() {
            const host = document.getElementById('host').value.trim();
            const fileInput = document.getElementById('comboFile');
            const file = fileInput.files[0];
            
            if (!host) {
                alert('❌ Por favor ingresa un HOST');
                return;
            }
            
            if (!file) {
                alert('❌ Por favor selecciona un archivo de combos');
                return;
            }
            
            // Verificar contenido del archivo
            const fileContent = await file.text();
            const validLines = fileContent.split(/\r?\n/).filter(l => l.trim() && l.includes(':'));
            
            if (validLines.length === 0) {
                alert('❌ El archivo no contiene combos válidos.\nFormato requerido: usuario:contraseña');
                return;
            }
            
            isScanning = true;
            disableButtons(true);
            allHits = [];
            document.getElementById('results').innerHTML = '<div class="loading"><div class="spinner"></div> Escaneando combos... Esto puede tomar varios minutos</div>';
            updateStats(0, validLines.length, 0, 0);
            
            const formData = new FormData();
            formData.append('host', cleanHost(host));
            formData.append('nick', document.getElementById('nick').value || '@hacker056');
            formData.append('comboFile', file);
            
            const startBtn = document.getElementById('startBtn');
            const originalText = startBtn.innerHTML;
            startBtn.innerHTML = '<div class="spinner" style="display:inline-block; margin-right:8px;"></div> ESCANEANDO...';
            
            try {
                currentAbortController = new AbortController();
                
                const response = await fetch('/api/scan', {
                    method: 'POST',
                    body: formData,
                    signal: currentAbortController.signal
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('results').innerHTML = '';
                    
                    for (const hit of data.hits) {
                        if (!isScanning) break;
                        addHitToDisplay(hit);
                        allHits.push(hit);
                    }
                    
                    updateStats(data.stats.testados, data.stats.total, data.stats.hits, data.stats.invalidos);
                    
                    if (data.stats.hits > 0) {
                        alert(`✅ ESCANEO COMPLETADO!\n\n✅ HITS encontrados: ${data.stats.hits}\n❌ Combos inválidos: ${data.stats.invalidos}\n📊 Total probados: ${data.stats.testados}`);
                    } else {
                        alert(`⚠️ ESCANEO COMPLETADO SIN HITS\n\n❌ No se encontraron cuentas válidas\n📊 Total probados: ${data.stats.testados}`);
                    }
                } else {
                    alert(`❌ Error: ${data.error}`);
                    document.getElementById('results').innerHTML = `<div class="loading" style="color:#ff0000">❌ Error: ${data.error}</div>`;
                }
            } catch (error) {
                if (error.name === 'AbortError') {
                    document.getElementById('results').innerHTML = '<div class="loading">⏹️ Escaneo detenido por el usuario</div>';
                } else {
                    console.error('Error:', error);
                    alert(`❌ Error: ${error.message}`);
                    document.getElementById('results').innerHTML = `<div class="loading" style="color:#ff0000">❌ Error de conexión: ${error.message}</div>`;
                }
            } finally {
                isScanning = false;
                disableButtons(false);
                startBtn.innerHTML = originalText;
                currentAbortController = null;
            }
        }
        
        function stopScan() {
            if (currentAbortController) {
                isScanning = false;
                currentAbortController.abort();
                disableButtons(false);
            }
        }
        
        function saveHits() {
            if (allHits.length === 0) {
                alert('❌ No hay hits para guardar');
                return;
            }
            
            const host = document.getElementById('host').value.trim() || 'scan';
            const date = new Date().toISOString().slice(0, 19).replace(/:/g, '-');
            const filename = `Team_Starblack_HITS_${host}_${date}.txt`;
            
            const content = allHits.join('\n\n' + '='.repeat(80) + '\n\n');
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            alert(`💾 Se guardaron ${allHits.length} hits en el archivo ${filename}`);
        }
        
        function clearResults() {
            if (allHits.length > 0 && confirm('¿Borrar todos los resultados?')) {
                allHits = [];
                document.getElementById('results').innerHTML = '<div class="loading">Resultados limpiados</div>';
                updateStats(0, 0, 0, 0);
            } else if (allHits.length === 0) {
                document.getElementById('results').innerHTML = '<div class="loading">Esperando inicio del escaneo...</div>';
            }
        }
        
        // Test de conexión al servidor al cargar
        async function testServer() {
            try {
                const response = await fetch('/api/test');
                const data = await response.json();
                if (data.success) {
                    console.log('✅ Servidor conectado');
                }
            } catch (error) {
                console.error('❌ Servidor no responde:', error);
                document.getElementById('results').innerHTML = '<div class="loading" style="color:#ff0000">⚠️ Error de conexión con el servidor. Asegúrate que el servidor esté corriendo.</div>';
            }
        }
        
        testServer();
    </script>
</body>
</html>
